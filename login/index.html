<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="grid-bg"></div>
    <div class="container">
      <div class="card active" id="login">
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to continue</p>
        <form action="/" method="post">
          <div class="field">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="your name"
              required
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>
          <div class="forgot"><a href="#">Forgot password?</a></div>
          <button type="submit">Sign In →</button>
        </form>

        <div class="divider">or</div>
        <p class="signup">
          No account yet?
          <a href="#" onclick="showForm('register')">Create one</a>
        </p>
      </div>
      <div class="card" id="register">
        <h1>Welcome</h1>
        <p class="subtitle">Create an account to continue</p>
        <form action="/login/#" method="post">
          <div class="field">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="name"
              required
            />
          </div>
          <div class="field">
            <label for="username">Email</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="your@mail.com"
              required
            />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input
              type="password"
              id="newPassword"
              name="password"
              placeholder="••••••••"
              required
            />
          </div>
          <button type="submit">Sign In →</button>
        </form>

        <div class="divider">or</div>
        <p class="signup">
          Do you have an account?
          <a href="#" onclick="showForm('login')">Login</a>
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
